<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post" >
        <div>
            <h1>Registration Form</h1>
            <label type="text"> First Name:*</label>
            <input type="text" name="txtFName" id="FName">
        </div>
        <div>
            <label>Last Name:*</label>
            <input type="text" name="txtLName" id="LName">
        </div>
        <div>
            <label>Email Address:*</label>
            <input type="text" name="txtEmail" id="Email">
        </div>
        <div>
            <label>Password:*</label>
            <input type="password" name="txtPassword" id="PAssword">
        </div>
        <div>
            <label>Confirm Password:*</label>
            <input type="password" name="txtCPassword" id="CPAssword">
        </div>
        <div>
            <label>Birthday:</label>
            <input type="date" name="dtFecha" id="Fecha">
        </div>
        <div>
            <label for="Gender Identity"></label>
        </div>
        <div>
            <input type="radio" name="Primero" id="Primero">
            <label type="bold"> Male</label>
            <input type="radio" name="Segundo" id="Segundo">
            <label type="bold">Female</label>
            <input type="radio" name="Tercero" id="Tercero">
            <label type="bold"> Non-binary</label>
            <input type="radio" name="Cuarto" id="Cuarto">
            <label type="bold">I prefer not to answer</label>
        </div>
        <div>
            <label>A short description about me</label>
        </div>
        <div>
            <textarea name="description" id="description" cols="35" rows="5"></textarea>
        </div>
        <div>
            <label>Favorite language</label>
            <select name="language" id="language">
                <option value="JavaScript">JavaScript</option>
                <option value="C#">C#</option>
            </select>
        </div>
        <div>
            <input type="checkbox" name="accept" id="accept">
            <label>Yes, I would like to receive periodic email updates</label>
        </div>
        <div>
            <button>Create account</button>
        </div>
        <div>
            <label>* Indicates a required field</label>
        </div>
    </form>
</body>
</html>
